<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0e0f11;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #c8a96e;
    user-select: none;
  }
  img { width: 96px; height: 96px; margin-bottom: 24px; animation: pulse 1.8s ease-in-out infinite; }
  h1 { font-size: 28px; font-weight: 600; letter-spacing: 0.08em; margin-bottom: 8px; }
  p  { font-size: 13px; color: #5a5750; letter-spacing: 0.05em; }
  .dots { display: inline-block; }
  @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
</style>
</head>
<body>
  <img src="../build/icon-256.png" onerror="this.style.display='none'">
  <h1>Quillon</h1>
  <p>Starting up<span class="dots" id="dots">...</span></p>
  <script>
    let i = 0
    setInterval(() => {
      document.getElementById('dots').textContent = ['...','.. ','...'][i++ % 3]
    }, 500)
  </script>
</body>
</html>
